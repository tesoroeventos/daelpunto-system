<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Da El Punto — TV</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      overflow:hidden;
      transform-origin:top left;
      background:#0a1a0d;
      color:#F5F5F0;
      font-family:'Inter',sans-serif;
    }

    /* ── SETUP ── */
    #setup{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100%;height:100%;gap:28px;padding:48px;
    }
    #setup h1{font-family:'Bebas Neue',sans-serif;font-size:72px;color:#E8D44D;letter-spacing:5px}
    .s-sub{font-size:18px;color:rgba(245,245,240,.4);letter-spacing:3px;text-transform:uppercase}
    .s-lbl{font-size:15px;color:rgba(245,245,240,.4);letter-spacing:1px;text-transform:uppercase;width:100%;max-width:500px}
    .s-inp{
      background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.15);
      border-radius:14px;color:#F5F5F0;font-size:38px;font-weight:700;
      padding:18px 24px;outline:none;width:100%;max-width:500px;
      text-align:center;letter-spacing:8px;font-family:'Inter',sans-serif;
    }
    .s-inp:focus{border-color:rgba(232,212,77,.8)}
    .s-btn{
      background:#3D7A4A;border:none;border-radius:14px;color:#F5F5F0;
      font-size:24px;font-weight:600;padding:20px 0;width:100%;max-width:500px;
      cursor:pointer;font-family:'Inter',sans-serif;
    }
    .s-btn:hover,.s-btn:focus{background:#4a9058;outline:4px solid #E8D44D;outline-offset:2px}
    .s-err{color:#ff6b6b;font-size:15px;text-align:center;min-height:22px}
    #canchas-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:16px;width:100%;max-width:900px;
    }
    .c-btn{
      background:rgba(255,255,255,.05);border:3px solid rgba(255,255,255,.12);
      border-radius:18px;color:#F5F5F0;font-family:'Bebas Neue',sans-serif;
      padding:32px 16px;cursor:pointer;text-align:center;transition:all .15s;
    }
    .c-btn:hover,.c-btn:focus{background:rgba(61,122,74,.4);border-color:#E8D44D;outline:none;transform:scale(1.05)}
    .c-btn .num{font-size:60px;color:#E8D44D;display:block;line-height:1}
    .c-btn .nom{font-size:15px;font-family:'Inter',sans-serif;color:rgba(245,245,240,.5);margin-top:6px;display:block}
    .btn-back{background:transparent;border:2px solid rgba(255,255,255,.2);border-radius:10px;color:rgba(245,245,240,.4);font-size:18px;padding:12px 28px;cursor:pointer;font-family:'Inter',sans-serif}
    .btn-back:hover,.btn-back:focus{border-color:rgba(255,255,255,.5);color:#F5F5F0;outline:none}

    /* ── SCOREBOARD ── */
    #scoreboard{
      display:none;
      width:100%;height:100%;
      flex-direction:column;
    }

    /* Header */
    .hdr{
      background:#0d2211;border-bottom:3px solid #3D7A4A;
      padding:10px 40px;
      display:flex;align-items:center;justify-content:space-between;
      height:56px;flex-shrink:0;
    }
    .hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#E8D44D;letter-spacing:3px}
    .hdr-cancha{font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(245,245,240,.7);letter-spacing:2px}
    .hdr-status{display:flex;align-items:center;gap:8px}
    .hdr-dot{width:12px;height:12px;border-radius:50%;background:#3D7A4A}
    .hdr-dot.off{background:rgba(255,255,255,.2)}
    .hdr-txt{font-size:15px;color:rgba(245,245,240,.35);letter-spacing:1px}

    /* Área del marcador — flex:1 ocupa todo lo que queda */
    .score-area{
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:0;
      padding:8px 20px 6px;
      gap:10px;
    }

    /* PARTIDO */
    .match-row{
      flex:1;
      display:grid;
      grid-template-columns:1fr 180px 1fr;
      gap:16px;
      min-height:0;
    }

    /* Panel equipo */
    .team{
      display:flex;flex-direction:column;
      align-items:center;justify-content:space-evenly;
      border-radius:20px;
      background:rgba(255,255,255,.03);
      border:3px solid rgba(255,255,255,.07);
      padding:16px 12px;
      min-height:0;
      transition:all .3s;
    }
    .team.srv{border-color:rgba(232,212,77,.55);background:rgba(232,212,77,.04)}

    .t-name{
      font-family:'Bebas Neue',sans-serif;
      font-size:min(6vw,68px);
      letter-spacing:2px;color:#F5F5F0;
      text-align:center;line-height:1.1;
    }
    .t-score{
      font-family:'Bebas Neue',sans-serif;
      font-size:min(28vw,260px);
      line-height:0.85;color:#F5F5F0;
      letter-spacing:4px;
    }
    .t-score.adv{color:#E8D44D}
    .t-score.oro{color:#E8D44D;font-size:min(16vw,140px);line-height:1}
    .t-lbl{
      font-size:min(2.5vw,28px);
      color:rgba(245,245,240,.4);
      letter-spacing:3px;text-transform:uppercase;
      min-height:28px;
    }
    .t-sets{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .t-dot{
      width:min(7vw,68px);height:min(7vw,68px);
      border-radius:50%;
      background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);
      display:flex;align-items:center;justify-content:center;
      font-family:'Bebas Neue',sans-serif;font-size:min(3.5vw,32px);
      color:rgba(245,245,240,.3);transition:.3s;
    }
    .t-dot.won{background:#E8D44D;border-color:#E8D44D;color:#0a1a0d}

    /* Centro */
    .center{
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:8px;
    }
    .c-lbl{font-size:min(1.6vw,16px);color:rgba(245,245,240,.3);letter-spacing:2px;text-transform:uppercase;text-align:center}
    .c-games{
      font-family:'Bebas Neue',sans-serif;
      font-size:min(11vw,110px);
      color:rgba(245,245,240,.5);
      letter-spacing:2px;text-align:center;
      line-height:1;
    }
    .c-sep{font-size:min(4vw,40px);color:rgba(245,245,240,.2);display:block;line-height:1}
    .c-serve{font-size:min(7vw,72px);color:#E8D44D;margin-top:4px}

    /* Footer */
    .ftr{
      background:rgba(0,0,0,.3);border-top:1px solid rgba(255,255,255,.06);
      padding:6px 40px;height:38px;flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
    }
    .ftr-hist{display:flex;gap:20px;font-size:15px;color:rgba(245,245,240,.35)}
    .ftr-time{font-size:15px;color:rgba(245,245,240,.25)}

    /* Empty */
    .empty{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:20px;
    }
    .empty-big{font-family:'Bebas Neue',sans-serif;font-size:min(18vw,160px);color:#E8D44D;letter-spacing:6px;opacity:.25}
    .empty-sub{font-size:22px;color:rgba(245,245,240,.2);letter-spacing:3px;text-transform:uppercase}

    /* Flash */
    .flash{
      display:none;position:fixed;
      top:42%;left:50%;transform:translate(-50%,-50%);
      border-radius:24px;padding:20px 64px;
      font-family:'Bebas Neue',sans-serif;font-size:min(10vw,80px);
      letter-spacing:4px;z-index:99;pointer-events:none;
      opacity:0;transition:opacity .12s;
    }
    .flash.show{display:block;opacity:1}
    .flash.f0{background:rgba(61,122,74,.96);color:#F5F5F0}
    .flash.f1{background:rgba(232,212,77,.96);color:#0a1a0d}
    .oro-banner{
      display:none;position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      background:rgba(232,212,77,.97);border-radius:24px;
      padding:24px 64px;font-family:'Bebas Neue',sans-serif;
      font-size:min(9vw,72px);color:#0a1a0d;letter-spacing:4px;
      z-index:100;pointer-events:none;
    }
    .oro-banner.show{display:block}
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>Da El Punto</h1>
  <div class="s-sub">Pantalla TV</div>

  <div id="step-1" style="display:flex;flex-direction:column;align-items:center;gap:18px;width:100%">
    <div class="s-lbl">Código del club</div>
    <input class="s-inp" id="inp-cod" type="text" placeholder="DEMO"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter') cargar()"/>
    <div class="s-err" id="s-err"></div>
    <button class="s-btn" onclick="cargar()">Cargar canchas →</button>
  </div>

  <div id="step-2" style="display:none;flex-direction:column;align-items:center;gap:20px;width:100%">
    <div class="s-sub">Seleccioná la cancha</div>
    <div id="canchas-grid"></div>
    <button class="btn-back" onclick="volver()">← Volver</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div id="scoreboard">
  <div class="hdr">
    <div class="hdr-logo">Da El Punto</div>
    <div class="hdr-cancha" id="hdr-cancha">—</div>
    <div class="hdr-status">
      <div class="hdr-dot off" id="hdr-dot"></div>
      <div class="hdr-txt" id="hdr-txt">Conectando…</div>
    </div>
  </div>

  <div class="score-area" id="score-area">
    <div class="empty">
      <div class="empty-big">READY</div>
      <div class="empty-sub">Esperando partido…</div>
    </div>
  </div>
</div>

<div class="oro-banner" id="oro-banner">🥇 PUNTO DE ORO</div>
<div class="flash" id="flash"></div>

<script>
// Auto-escala para TVs con alta resolución
(function() {
  function escalar() {
    var BASE_W = 1280; // ancho base de diseño
    var w = window.innerWidth;
    var h = window.innerHeight;
    var scaleW = w / BASE_W;
    // Aplicar zoom al body
    document.body.style.zoom = scaleW;
    // Compensar altura
    document.body.style.height = (h / scaleW) + 'px';
    document.body.style.width = BASE_W + 'px';
  }
  window.addEventListener('load', escalar);
  window.addEventListener('resize', escalar);
})();

var WSU = (location.protocol==='https:' ? 'wss' : 'ws') + '://' + location.host;
var ws, canchaId, canchaNombre, flashT;

function cargar() {
  var cod = document.getElementById('inp-cod').value.trim().toUpperCase();
  var err = document.getElementById('s-err');
  err.textContent = '';
  if (!cod) { err.textContent = 'Ingresa el codigo del club'; return; }

  fetch('/api/club/' + cod)
    .then(function(r) {
      if (!r.ok) { err.textContent = 'Club no encontrado'; return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      // Guardar canchas globalmente para usarlas en botones
      window._canchas = data.canchas;
      var g = document.getElementById('canchas-grid');
      var html = '';
      for (var i = 0; i < data.canchas.length; i++) {
        var nom = data.canchas[i].nombre || ('Cancha ' + data.canchas[i].numero);
        html += '<button class="c-btn" onclick="selCancha(' + i + ')">';
        html += '<span class="num">' + data.canchas[i].numero + '</span>';
        html += '<span class="nom">' + nom + '</span>';
        html += '</button>';
      }
      g.innerHTML = html;
      document.getElementById('step-1').style.display = 'none';
      document.getElementById('step-2').style.display = 'flex';
      var f = g.querySelector('.c-btn');
      if (f) f.focus();
    })
    .catch(function() {
      err.textContent = 'Error conectando al servidor';
    });
}

function selCancha(i) {
  var c = window._canchas[i];
  conectar(c.id, c.nombre || ('Cancha ' + c.numero));
}

function volver() {
  document.getElementById('step-1').style.display = 'flex';
  document.getElementById('step-2').style.display = 'none';
}

function conectar(id, nombre) {
  canchaId=id; canchaNombre=nombre;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'flex';
  document.getElementById('hdr-cancha').textContent = nombre;
  connectWS();
}

function connectWS() {
  ws = new WebSocket(WSU);
  ws.onopen = function() {
    ws.send(JSON.stringify({type:'JOIN_TV',canchaId:canchaId}));
    dot(true,'En vivo');
  };
  ws.onmessage = function(e) {
    var m = JSON.parse(e.data);
    if (m.type==='INIT') render(m.state);
    else if (m.type==='STATE_UPDATE') { doFlash(m.state); render(m.state); }
    else if (m.type==='PARTIDO_INICIADO') render(m.state);
    else if (m.type==='PARTIDO_FINALIZADO') empty();
  };
  ws.onclose = function() { dot(false,'Reconectando...'); setTimeout(connectWS,3000); };
  ws.onerror = function() { ws.close(); };
}

function dot(ok,txt) {
  document.getElementById('hdr-dot').className='hdr-dot'+(ok?'':' off');
  document.getElementById('hdr-txt').textContent=txt;
}

function empty() {
  document.getElementById('score-area').innerHTML=`
    <div class="empty">
      <div class="empty-big">READY</div>
      <div class="empty-sub">Esperando partido…</div>
    </div>`;
}

function render(s) {
  if (!s) { empty(); return; }
  const sc0=s.displayScore[0], sc1=s.displayScore[1];

  const dots = t => [0,1,2].map(i => {
    const h=s.setHistory[i];
    const w=h&&(t===0?h.e1>h.e2:h.e2>h.e1);
    return `<div class="t-dot${h?(w?' won':''):''}">${h?(t===0?h.e1:h.e2):'—'}</div>`;
  }).join('');

  const lbl = t => {
    if (s.puntosOro||s.pts[0]<3||s.pts[1]<3) return '';
    if (s.pts[0]===s.pts[1]) return 'DEUCE';
    return s.pts[t]>s.pts[1-t]?'VENTAJA':'';
  };

  const hist = s.setHistory.map((h,i)=>`<span>Set ${i+1}: ${h.e1}–${h.e2}</span>`).join('');
  document.getElementById('oro-banner').className='oro-banner'+(s.isOro?' show':'');

  document.getElementById('score-area').innerHTML = `
    <div class="match-row">
      <div class="team ${s.serving===0?'srv':''}">
        <div class="t-name">${s.equipo1}</div>
        <div class="t-score ${sc0==='AD'?'adv':''} ${sc0==='ORO'?'oro':''}">${sc0==='ORO'?'🥇':sc0}</div>
        <div class="t-lbl">${lbl(0)}</div>
        <div class="t-sets">${dots(0)}</div>
      </div>

      <div class="center">
        <div class="c-lbl">Set ${s.currentSet}</div>
        <div class="c-games">
          ${s.games[0]}<span class="c-sep">—</span>${s.games[1]}
        </div>
        <div class="c-serve">${s.serving===0?'◀':'▶'}</div>
        <div class="c-lbl">Saque</div>
      </div>

      <div class="team ${s.serving===1?'srv':''}">
        <div class="t-name">${s.equipo2}</div>
        <div class="t-score ${sc1==='AD'?'adv':''} ${sc1==='ORO'?'oro':''}">${sc1==='ORO'?'🥇':sc1}</div>
        <div class="t-lbl">${lbl(1)}</div>
        <div class="t-sets">${dots(1)}</div>
      </div>
    </div>

    <div class="ftr">
      <div class="ftr-hist">${hist}</div>
      <div class="ftr-time" id="ftr-time"></div>
    </div>`;

  tick();
}

function flash(s) {
  const el=document.getElementById('flash');
  const t=s.pts[0]>=s.pts[1]?0:1;
  el.textContent='+1  '+(t===0?s.equipo1:s.equipo2);
  el.className=`flash f${t} show`;
  if(flashT) clearTimeout(flashT);
  flashT=setTimeout(()=>el.className='flash',800);
}

function tick() {
  const el=document.getElementById('ftr-time');
  if(el) el.textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}
setInterval(tick,30000);
</script>
</body>
</html>
