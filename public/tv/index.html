<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Da El Punto — TV</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a1a0d;color:#F5F5F0;font-family:'Inter',sans-serif}

    /* ── SETUP ── */
    #setup{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100vh;gap:28px;padding:48px;background:#0a1a0d;
    }
    #setup h1{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#E8D44D;letter-spacing:5px}
    .setup-sub{font-size:18px;color:rgba(245,245,240,.4);letter-spacing:3px;text-transform:uppercase}
    .setup-label{font-size:15px;color:rgba(245,245,240,.4);letter-spacing:1px;text-transform:uppercase;width:100%;max-width:520px}
    .setup-input{
      background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.15);
      border-radius:14px;color:#F5F5F0;font-size:40px;font-weight:700;
      padding:20px 28px;outline:none;width:100%;max-width:520px;
      text-align:center;letter-spacing:8px;font-family:'Inter',sans-serif;
    }
    .setup-input:focus{border-color:rgba(232,212,77,.8)}
    .setup-btn{
      background:#3D7A4A;border:none;border-radius:14px;color:#F5F5F0;
      font-size:26px;font-weight:600;padding:22px 0;width:100%;max-width:520px;
      cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:1px;
    }
    .setup-btn:hover,.setup-btn:focus{background:#4a9058;outline:4px solid #E8D44D;outline-offset:2px}
    .setup-error{color:#ff6b6b;font-size:16px;text-align:center;min-height:24px}
    .setup-hint{font-size:14px;color:rgba(245,245,240,.25);text-align:center}

    /* Botones de cancha */
    #canchas-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:20px;width:100%;max-width:1000px;
    }
    .cancha-btn{
      background:rgba(255,255,255,.05);border:3px solid rgba(255,255,255,.12);
      border-radius:20px;color:#F5F5F0;font-family:'Bebas Neue',sans-serif;
      padding:36px 16px;cursor:pointer;text-align:center;transition:all .15s;
    }
    .cancha-btn:hover,.cancha-btn:focus{
      background:rgba(61,122,74,.4);border-color:#E8D44D;
      outline:none;transform:scale(1.05);
    }
    .cancha-btn .num{font-size:64px;color:#E8D44D;display:block;line-height:1}
    .cancha-btn .nom{font-size:16px;font-family:'Inter',sans-serif;color:rgba(245,245,240,.5);margin-top:8px;display:block}
    .btn-volver{
      background:transparent;border:2px solid rgba(255,255,255,.2);border-radius:10px;
      color:rgba(245,245,240,.4);font-size:18px;padding:12px 28px;cursor:pointer;
      font-family:'Inter',sans-serif;
    }
    .btn-volver:hover,.btn-volver:focus{border-color:rgba(255,255,255,.5);color:#F5F5F0;outline:none}

    /* ── SCOREBOARD ── */
    #scoreboard{
      display:none;
      width:100vw;height:100vh;
      flex-direction:column;
      background:#0a1a0d;
    }

    /* Header compacto */
    .tv-header{
      background:#0d2211;
      border-bottom:3px solid #3D7A4A;
      padding:12px 48px;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
      height:72px;
    }
    .tv-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#E8D44D;letter-spacing:3px}
    .tv-cancha-lbl{font-family:'Bebas Neue',sans-serif;font-size:30px;color:rgba(245,245,240,.7);letter-spacing:2px}
    .tv-status{display:flex;align-items:center;gap:10px}
    .tv-dot{width:12px;height:12px;border-radius:50%;background:#3D7A4A;flex-shrink:0}
    .tv-dot.off{background:rgba(255,255,255,.2)}
    .tv-status-txt{font-size:16px;color:rgba(245,245,240,.4);letter-spacing:1px}

    /* MAIN — ocupa todo el resto */
    #tv-content{flex:1;display:flex;flex-direction:column;min-height:0}

    /* Estado vacío */
    .tv-empty{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:24px;
    }
    .tv-empty .big{font-family:'Bebas Neue',sans-serif;font-size:120px;color:#E8D44D;letter-spacing:6px;opacity:.3}
    .tv-empty .sub{font-size:24px;color:rgba(245,245,240,.25);letter-spacing:3px;text-transform:uppercase}

    /* SCORE LAYOUT — ocupa todo el alto disponible */
    .tv-main{
      flex:1;
      display:grid;
      grid-template-columns:1fr 220px 1fr;
      grid-template-rows:1fr;
      align-items:stretch;
      padding:24px 32px 16px;
      gap:20px;
      min-height:0;
    }

    /* Paneles de equipo */
    .tv-team{
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:16px;
      border-radius:24px;
      background:rgba(255,255,255,.03);
      border:3px solid rgba(255,255,255,.07);
      padding:24px 20px;
      transition:all .3s;
    }
    .tv-team.serving{
      border-color:rgba(232,212,77,.6);
      background:rgba(232,212,77,.05);
    }
    .tv-team.flash-win{
      background:rgba(61,122,74,.2);
      border-color:#3D7A4A;
    }

    .tv-team-name{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(32px,4.5vw,64px);
      letter-spacing:2px;
      color:#F5F5F0;
      text-align:center;
      line-height:1.1;
    }

    .tv-score{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(140px,22vw,240px);
      line-height:0.85;
      color:#F5F5F0;
      letter-spacing:4px;
    }
    .tv-score.adv{color:#E8D44D}
    .tv-score.oro{color:#E8D44D;font-size:clamp(80px,12vw,140px);line-height:1}

    .tv-score-label{
      font-size:clamp(16px,2vw,26px);
      color:rgba(245,245,240,.4);
      letter-spacing:3px;
      text-transform:uppercase;
      min-height:30px;
    }

    .tv-sets{
      display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
    }
    .tv-set-dot{
      width:clamp(40px,5.5vw,60px);
      height:clamp(40px,5.5vw,60px);
      border-radius:50%;
      background:rgba(255,255,255,.06);
      border:2px solid rgba(255,255,255,.1);
      display:flex;align-items:center;justify-content:center;
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(16px,2.5vw,28px);
      color:rgba(245,245,240,.3);
      transition:.3s;
    }
    .tv-set-dot.won{background:#E8D44D;border-color:#E8D44D;color:#0a1a0d}

    /* Centro */
    .tv-center{
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:12px;
    }
    .tv-set-lbl{
      font-size:clamp(14px,1.8vw,20px);
      color:rgba(245,245,240,.3);
      letter-spacing:2px;
      text-transform:uppercase;
      text-align:center;
    }
    .tv-games{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(48px,7vw,96px);
      color:rgba(245,245,240,.5);
      letter-spacing:2px;
      text-align:center;
      line-height:1;
    }
    .tv-games-sep{
      font-size:clamp(20px,3vw,40px);
      color:rgba(245,245,240,.2);
      display:block;
      line-height:1;
    }
    .tv-serve{
      font-size:clamp(28px,4vw,52px);
      color:#E8D44D;
      margin-top:4px;
    }

    /* Footer */
    .tv-footer{
      background:rgba(0,0,0,.3);
      border-top:1px solid rgba(255,255,255,.06);
      padding:8px 48px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-shrink:0;
      height:44px;
    }
    .tv-history{display:flex;gap:24px;font-size:16px;color:rgba(245,245,240,.35)}
    .tv-time{font-size:16px;color:rgba(245,245,240,.25)}

    /* Overlays */
    .tv-oro-banner{
      display:none;position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      background:rgba(232,212,77,.97);
      border-radius:24px;padding:24px 64px;
      font-family:'Bebas Neue',sans-serif;font-size:64px;
      color:#0a1a0d;letter-spacing:4px;z-index:100;pointer-events:none;
    }
    .tv-oro-banner.show{display:block}

    .tv-flash{
      display:none;position:fixed;top:42%;left:50%;
      transform:translate(-50%,-50%);
      border-radius:24px;padding:20px 64px;
      font-family:'Bebas Neue',sans-serif;font-size:72px;
      letter-spacing:4px;z-index:99;pointer-events:none;
      opacity:0;transition:opacity .12s;
    }
    .tv-flash.show{display:block;opacity:1}
    .tv-flash.f0{background:rgba(61,122,74,.96);color:#F5F5F0}
    .tv-flash.f1{background:rgba(232,212,77,.96);color:#0a1a0d}
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>Da El Punto</h1>
  <div class="setup-sub">Pantalla TV</div>

  <div id="step-1" style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%">
    <div class="setup-label">Código del club</div>
    <input class="setup-input" id="inp-codigo" type="text" placeholder="DEMO"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter') cargarCanchas()"/>
    <div class="setup-error" id="setup-error"></div>
    <button class="setup-btn" onclick="cargarCanchas()">Cargar canchas →</button>
    <div class="setup-hint">Presioná Enter o el botón para continuar</div>
  </div>

  <div id="step-2" style="display:none;flex-direction:column;align-items:center;gap:24px;width:100%">
    <div class="setup-sub">Seleccioná la cancha</div>
    <div id="canchas-grid"></div>
    <button class="btn-volver" onclick="volverPaso1()">← Volver</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div id="scoreboard">
  <div class="tv-header">
    <div class="tv-logo">Da El Punto</div>
    <div class="tv-cancha-lbl" id="tv-cancha-lbl">—</div>
    <div class="tv-status">
      <div class="tv-dot off" id="tv-dot"></div>
      <div class="tv-status-txt" id="tv-status-txt">Conectando…</div>
    </div>
  </div>
  <div id="tv-content" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div class="tv-empty">
      <div class="big">READY</div>
      <div class="sub">Esperando partido…</div>
    </div>
  </div>
</div>

<div class="tv-oro-banner" id="tv-oro">🥇 PUNTO DE ORO</div>
<div class="tv-flash" id="tv-flash"></div>

<script>
const WS_URL = `${location.protocol==='https:'?'wss':'ws'}://${location.host}`;
let ws, canchaId, canchaNombre, flashT;

// ── SETUP ──────────────────────────────────────────────────────────────────

async function cargarCanchas() {
  const codigo = document.getElementById('inp-codigo').value.trim().toUpperCase();
  const err = document.getElementById('setup-error');
  err.textContent = '';
  if (!codigo) { err.textContent = 'Ingresá el código del club'; return; }
  try {
    const r = await fetch(`/api/club/${codigo}`);
    if (!r.ok) { err.textContent = 'Club no encontrado'; return; }
    const { canchas } = await r.json();
    const grid = document.getElementById('canchas-grid');
    grid.innerHTML = canchas.map(c =>
      `<button class="cancha-btn" onclick="conectar('${c.id}','${(c.nombre||'Cancha '+c.numero).replace(/'/g,'')}')" >
        <span class="num">${c.numero}</span>
        <span class="nom">${c.nombre||'Cancha '+c.numero}</span>
      </button>`).join('');
    document.getElementById('step-1').style.display = 'none';
    document.getElementById('step-2').style.display = 'flex';
    setTimeout(() => { const f=grid.querySelector('.cancha-btn'); if(f) f.focus(); }, 150);
  } catch(e) { err.textContent = 'Error conectando al servidor'; }
}

function volverPaso1() {
  document.getElementById('step-1').style.display = 'flex';
  document.getElementById('step-2').style.display = 'none';
}

function conectar(id, nombre) {
  canchaId = id; canchaNombre = nombre;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'flex';
  document.getElementById('tv-cancha-lbl').textContent = nombre;
  connectWS();
}

// ── WEBSOCKET ──────────────────────────────────────────────────────────────

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type:'JOIN_TV', canchaId }));
    setStatus(true,'En vivo');
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type==='INIT') renderState(msg.state);
    else if (msg.type==='STATE_UPDATE') { doFlash(msg.state); renderState(msg.state); }
    else if (msg.type==='PARTIDO_INICIADO') renderState(msg.state);
    else if (msg.type==='PARTIDO_FINALIZADO') renderEmpty();
  };
  ws.onclose = () => { setStatus(false,'Reconectando…'); setTimeout(connectWS,3000); };
  ws.onerror = () => ws.close();
}

function setStatus(ok, txt) {
  document.getElementById('tv-dot').className = 'tv-dot'+(ok?'':' off');
  document.getElementById('tv-status-txt').textContent = txt;
}

// ── RENDER ─────────────────────────────────────────────────────────────────

function renderEmpty() {
  document.getElementById('tv-content').innerHTML = `
    <div class="tv-empty">
      <div class="big">READY</div>
      <div class="sub">Esperando partido…</div>
    </div>`;
}

function renderState(s) {
  if (!s) { renderEmpty(); return; }

  const sc0=s.displayScore[0], sc1=s.displayScore[1];

  const dots = (t) => [0,1,2].map(i => {
    const h=s.setHistory[i];
    const won = h && (t===0 ? h.e1>h.e2 : h.e2>h.e1);
    return `<div class="tv-set-dot${h?(won?' won':''):''}">${h?(t===0?h.e1:h.e2):'—'}</div>`;
  }).join('');

  const lbl = (t) => {
    if (s.puntosOro || s.pts[0]<3 || s.pts[1]<3) return '';
    if (s.pts[0]===s.pts[1]) return 'DEUCE';
    return s.pts[t]>s.pts[1-t] ? 'VENTAJA' : '';
  };

  const hist = s.setHistory.map((h,i)=>`<span>Set ${i+1}: ${h.e1}–${h.e2}</span>`).join('');

  document.getElementById('tv-oro').className = 'tv-oro-banner'+(s.isOro?' show':'');

  document.getElementById('tv-content').innerHTML = `
    <div class="tv-main">
      <div class="tv-team ${s.serving===0?'serving':''}">
        <div class="tv-team-name">${s.equipo1}</div>
        <div class="tv-score ${sc0==='AD'?'adv':''} ${sc0==='ORO'?'oro':''}">${sc0==='ORO'?'🥇':sc0}</div>
        <div class="tv-score-label">${lbl(0)}</div>
        <div class="tv-sets">${dots(0)}</div>
      </div>

      <div class="tv-center">
        <div class="tv-set-lbl">Set ${s.currentSet}</div>
        <div class="tv-games">
          ${s.games[0]}<span class="tv-games-sep">—</span>${s.games[1]}
        </div>
        <div class="tv-serve">${s.serving===0?'◀':'▶'}</div>
        <div class="tv-set-lbl">Saque</div>
      </div>

      <div class="tv-team ${s.serving===1?'serving':''}">
        <div class="tv-team-name">${s.equipo2}</div>
        <div class="tv-score ${sc1==='AD'?'adv':''} ${sc1==='ORO'?'oro':''}">${sc1==='ORO'?'🥇':sc1}</div>
        <div class="tv-score-label">${lbl(1)}</div>
        <div class="tv-sets">${dots(1)}</div>
      </div>
    </div>

    <div class="tv-footer">
      <div class="tv-history">${hist}</div>
      <div class="tv-time" id="tv-time"></div>
    </div>`;

  updateTime();
}

function doFlash(s) {
  const el = document.getElementById('tv-flash');
  // Detectar quién sumó comparando con estado previo — usar el que tiene más puntos
  const t = s.pts[0] >= s.pts[1] ? 0 : 1;
  el.textContent = '+1  '+(t===0?s.equipo1:s.equipo2);
  el.className = `tv-flash f${t} show`;
  if (flashT) clearTimeout(flashT);
  flashT = setTimeout(()=>el.className='tv-flash', 800);
}

function updateTime() {
  const el = document.getElementById('tv-time');
  if (el) el.textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateTime, 30000);
</script>
</body>
</html>
