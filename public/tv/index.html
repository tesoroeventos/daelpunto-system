<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Da El Punto — TV</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a1a0d;color:#F5F5F0;font-family:'Inter',sans-serif}

    /* ── SETUP ── */
    #setup{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100vh;gap:24px;padding:40px;
    }
    #setup h1{
      font-family:'Bebas Neue',sans-serif;font-size:72px;color:#E8D44D;letter-spacing:4px;
    }
    .setup-sub{font-size:16px;color:rgba(245,245,240,.4);letter-spacing:2px;text-transform:uppercase}
    .setup-label{font-size:13px;color:rgba(245,245,240,.4);letter-spacing:1px;text-transform:uppercase;align-self:flex-start;width:100%;max-width:500px}
    .setup-input{
      background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
      border-radius:12px;color:#F5F5F0;font-size:32px;font-weight:600;
      padding:16px 24px;outline:none;width:100%;max-width:500px;
      text-align:center;letter-spacing:6px;font-family:'Inter',sans-serif;
    }
    .setup-input:focus{border-color:rgba(232,212,77,.7)}
    .setup-btn{
      background:#3D7A4A;border:none;border-radius:12px;color:#F5F5F0;
      font-size:22px;font-weight:600;padding:18px 0;width:100%;max-width:500px;
      cursor:pointer;font-family:'Inter',sans-serif;
    }
    .setup-btn:hover,.setup-btn:focus{background:#4a9058;outline:3px solid #E8D44D}
    .setup-error{color:#ff6b6b;font-size:15px;text-align:center;min-height:20px}

    /* Botones de cancha */
    #canchas-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:16px;width:100%;max-width:900px;
    }
    .cancha-btn{
      background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);
      border-radius:16px;color:#F5F5F0;font-family:'Bebas Neue',sans-serif;
      padding:28px 16px;cursor:pointer;text-align:center;transition:all .15s;
    }
    .cancha-btn:hover,.cancha-btn:focus{
      background:rgba(61,122,74,.35);border-color:#E8D44D;
      outline:none;transform:scale(1.04);
    }
    .cancha-btn .num{font-size:52px;color:#E8D44D;display:block;line-height:1}
    .cancha-btn .nom{font-size:15px;font-family:'Inter',sans-serif;color:rgba(245,245,240,.5);margin-top:6px;display:block}
    .btn-volver{
      background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:8px;
      color:rgba(245,245,240,.4);font-size:15px;padding:10px 24px;cursor:pointer;
    }
    .btn-volver:hover,.btn-volver:focus{border-color:rgba(255,255,255,.4);color:#F5F5F0;outline:none}

    /* ── SCOREBOARD ── */
    #scoreboard{display:none;width:100vw;height:100vh;flex-direction:column}
    .tv-header{background:rgba(0,0,0,.4);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #3D7A4A;flex-shrink:0}
    .tv-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#E8D44D;letter-spacing:2px}
    .tv-cancha{font-size:20px;color:rgba(245,245,240,.6);letter-spacing:1px}
    .tv-status{display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(245,245,240,.5)}
    .tv-status-dot{width:10px;height:10px;border-radius:50%;background:#3D7A4A}
    .tv-status-dot.inactive{background:rgba(255,255,255,.2)}
    .tv-main{flex:1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:20px 40px;gap:20px}
    .tv-team{display:flex;flex-direction:column;align-items:center;gap:12px;padding:30px;border-radius:20px;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.06);transition:all .3s}
    .tv-team.serving{border-color:rgba(232,212,77,.5);background:rgba(232,212,77,.04)}
    .tv-team-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,4vw,52px);letter-spacing:2px;color:#F5F5F0;text-align:center}
    .tv-score{font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,18vw,200px);line-height:1;color:#F5F5F0;letter-spacing:4px}
    .tv-score.adv{color:#E8D44D}
    .tv-score.oro{color:#E8D44D;font-size:clamp(60px,10vw,120px);line-height:1.2}
    .tv-score-label{font-size:clamp(14px,2vw,22px);color:rgba(245,245,240,.4);letter-spacing:2px;text-transform:uppercase;min-height:26px}
    .tv-sets{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .tv-set-badge{width:clamp(36px,5vw,52px);height:clamp(36px,5vw,52px);border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:clamp(14px,2vw,22px);color:rgba(245,245,240,.3);transition:.3s}
    .tv-set-badge.won{background:#E8D44D;border-color:#E8D44D;color:#0a1a0d}
    .tv-center{display:flex;flex-direction:column;align-items:center;gap:16px}
    .tv-games{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,64px);color:rgba(245,245,240,.5);letter-spacing:2px;text-align:center;line-height:1.1}
    .tv-set-label{font-size:clamp(12px,1.5vw,16px);color:rgba(245,245,240,.3);letter-spacing:2px;text-transform:uppercase;text-align:center}
    .tv-serve-indicator{font-size:clamp(24px,3vw,36px);color:#E8D44D}
    .tv-footer{background:rgba(0,0,0,.3);padding:10px 40px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
    .tv-sets-history{display:flex;gap:20px;font-size:clamp(12px,1.5vw,16px);color:rgba(245,245,240,.4)}
    .tv-time{font-size:clamp(12px,1.5vw,16px);color:rgba(245,245,240,.3)}
    .tv-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;opacity:.4}
    .tv-empty .big{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#E8D44D;letter-spacing:4px}
    .tv-empty .sub{font-size:18px;color:rgba(245,245,240,.5);letter-spacing:2px}
    .tv-oro{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(232,212,77,.95);border-radius:20px;padding:20px 48px;font-family:'Bebas Neue',sans-serif;font-size:48px;color:#0a1a0d;letter-spacing:3px;z-index:100;pointer-events:none}
    .tv-oro.show{display:block}
    .tv-flash{display:none;position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);border-radius:20px;padding:16px 48px;font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:3px;z-index:99;pointer-events:none;opacity:0;transition:opacity .15s}
    .tv-flash.show{display:block;opacity:1}
    .tv-flash.f0{background:rgba(61,122,74,.95);color:#F5F5F0}
    .tv-flash.f1{background:rgba(232,212,77,.95);color:#0a1a0d}
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>Da El Punto</h1>
  <div class="setup-sub">Pantalla TV</div>

  <!-- Paso 1: código -->
  <div id="step-1" style="display:flex;flex-direction:column;align-items:center;gap:16px;width:100%">
    <div class="setup-label">Código del club</div>
    <input class="setup-input" id="inp-codigo" type="text" placeholder="DEMO"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter') cargarCanchas()"/>
    <div class="setup-error" id="setup-error"></div>
    <button class="setup-btn" onclick="cargarCanchas()">Cargar canchas →</button>
  </div>

  <!-- Paso 2: selección cancha -->
  <div id="step-2" style="display:none;flex-direction:column;align-items:center;gap:20px;width:100%">
    <div class="setup-sub">Seleccioná tu cancha</div>
    <div id="canchas-grid"></div>
    <button class="btn-volver" onclick="volverPaso1()">← Volver</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div id="scoreboard">
  <div class="tv-header">
    <div class="tv-logo">Da El Punto</div>
    <div class="tv-cancha" id="tv-cancha-nombre">Cancha —</div>
    <div class="tv-status">
      <div class="tv-status-dot inactive" id="tv-dot"></div>
      <span id="tv-status-txt">Conectando…</span>
    </div>
  </div>
  <div id="tv-content">
    <div class="tv-empty">
      <div class="big">READY</div>
      <div class="sub">Esperando partido…</div>
    </div>
  </div>
</div>

<div class="tv-oro" id="tv-oro">🥇 PUNTO DE ORO</div>
<div class="tv-flash" id="tv-flash"></div>

<script>
let ws, canchaId, canchaNombre, codigoClub;
let flashTimer;
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;

// ── SETUP ──────────────────────────────────────────────────────────────────

async function cargarCanchas() {
  const codigo = document.getElementById('inp-codigo').value.trim().toUpperCase();
  const err = document.getElementById('setup-error');
  err.textContent = '';

  if (!codigo) {
    err.textContent = 'Ingresá el código del club';
    return;
  }

  try {
    const r = await fetch(`/api/club/${codigo}`);
    if (!r.ok) {
      err.textContent = 'Club no encontrado. Verificá el código.';
      return;
    }
    const data = await r.json();
    codigoClub = codigo;

    const grid = document.getElementById('canchas-grid');
    grid.innerHTML = data.canchas.map(c => `
      <button class="cancha-btn" onclick="conectarCancha('${c.id}', '${(c.nombre || 'Cancha ' + c.numero).replace(/'/g, '')}')">
        <span class="num">${c.numero}</span>
        <span class="nom">${c.nombre || 'Cancha ' + c.numero}</span>
      </button>`).join('');

    document.getElementById('step-1').style.display = 'none';
    document.getElementById('step-2').style.display = 'flex';

    // Focus al primer botón para control remoto
    setTimeout(() => {
      const first = grid.querySelector('.cancha-btn');
      if (first) first.focus();
    }, 150);

  } catch(e) {
    err.textContent = 'Error conectando al servidor. Revisá la URL.';
  }
}

function volverPaso1() {
  document.getElementById('step-1').style.display = 'flex';
  document.getElementById('step-2').style.display = 'none';
}

function conectarCancha(id, nombre) {
  canchaId = id;
  canchaNombre = nombre;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'flex';
  document.getElementById('tv-cancha-nombre').textContent = canchaNombre;
  connectWS();
}

// ── WEBSOCKET ──────────────────────────────────────────────────────────────

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'JOIN_TV', canchaId }));
    setStatus(true, 'En vivo');
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'INIT') renderState(msg.state);
    else if (msg.type === 'STATE_UPDATE') { flashPoint(msg.state); renderState(msg.state); }
    else if (msg.type === 'PARTIDO_INICIADO') renderState(msg.state);
    else if (msg.type === 'PARTIDO_FINALIZADO') renderEmpty();
  };
  ws.onclose = () => {
    setStatus(false, 'Reconectando…');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
}

function setStatus(connected, txt) {
  document.getElementById('tv-dot').className = 'tv-status-dot' + (connected ? '' : ' inactive');
  document.getElementById('tv-status-txt').textContent = txt;
}

// ── RENDER ─────────────────────────────────────────────────────────────────

function renderEmpty() {
  document.getElementById('tv-content').innerHTML = `
    <div class="tv-empty">
      <div class="big">READY</div>
      <div class="sub">Esperando partido…</div>
    </div>`;
}

function renderState(s) {
  if (!s) { renderEmpty(); return; }
  const sets0 = [0,1,2].map(i => { const h=s.setHistory[i]; return `<div class="tv-set-badge${h&&h.e1>h.e2?' won':''}">${h?h.e1:'—'}</div>`; }).join('');
  const sets1 = [0,1,2].map(i => { const h=s.setHistory[i]; return `<div class="tv-set-badge${h&&h.e2>h.e1?' won':''}">${h?h.e2:'—'}</div>`; }).join('');
  const sc0 = s.displayScore[0], sc1 = s.displayScore[1];
  document.getElementById('tv-oro').className = 'tv-oro' + (s.isOro ? ' show' : '');
  const lbl0 = (!s.puntosOro&&s.pts[0]>=3&&s.pts[1]>=3) ? (s.pts[0]===s.pts[1]?'DEUCE':s.pts[0]>s.pts[1]?'VENTAJA':'') : '';
  const lbl1 = (!s.puntosOro&&s.pts[0]>=3&&s.pts[1]>=3) ? (s.pts[0]===s.pts[1]?'DEUCE':s.pts[1]>s.pts[0]?'VENTAJA':'') : '';
  const historial = s.setHistory.map((h,i) => `<span>Set ${i+1}: ${h.e1}–${h.e2}</span>`).join('');
  document.getElementById('tv-content').innerHTML = `
    <div class="tv-main">
      <div class="tv-team ${s.serving===0?'serving':''}">
        <div class="tv-team-name">${s.equipo1}</div>
        <div class="tv-score ${sc0==='AD'?'adv':''} ${sc0==='ORO'?'oro':''}">${sc0==='ORO'?'🥇':sc0}</div>
        <div class="tv-score-label">${lbl0}</div>
        <div class="tv-sets">${sets0}</div>
      </div>
      <div class="tv-center">
        <div class="tv-set-label">Set ${s.currentSet}</div>
        <div class="tv-games">${s.games[0]}<br><span style="font-size:.6em;color:rgba(245,245,240,.3)">—</span><br>${s.games[1]}</div>
        <div class="tv-serve-indicator">${s.serving===0?'▲':'▼'}</div>
        <div class="tv-set-label">Saque</div>
      </div>
      <div class="tv-team ${s.serving===1?'serving':''}">
        <div class="tv-team-name">${s.equipo2}</div>
        <div class="tv-score ${sc1==='AD'?'adv':''} ${sc1==='ORO'?'oro':''}">${sc1==='ORO'?'🥇':sc1}</div>
        <div class="tv-score-label">${lbl1}</div>
        <div class="tv-sets">${sets1}</div>
      </div>
    </div>
    <div class="tv-footer">
      <div class="tv-sets-history">${historial}</div>
      <div class="tv-time" id="tv-time"></div>
    </div>`;
  updateTime();
}

function flashPoint(s) {
  const el = document.getElementById('tv-flash');
  const t = s.pts[0] > s.pts[1] ? 0 : 1;
  el.textContent = '+1  ' + (t===0 ? s.equipo1 : s.equipo2);
  el.className = `tv-flash f${t} show`;
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.className = 'tv-flash', 700);
}

function updateTime() {
  const el = document.getElementById('tv-time');
  if (el) el.textContent = new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
}
setInterval(updateTime, 30000);
</script>
</body>
</html>
